global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "master-node:9100"
          - "worker-1:9100"
          - "worker-2:9100"
          - "worker-3:9100"

  - job_name: "spark-metrics"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - "master-node:4040"
