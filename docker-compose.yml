services:
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: adaptive-spark-master
    environment:
      PYTHONPATH: /workspace/src
    volumes:
      - ./:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: adaptive-spark-worker-1
    depends_on:
      - spark-master
    environment:
      PYTHONPATH: /workspace/src
    volumes:
      - ./:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --memory
      - 2G
      - --cores
      - "2"
      - spark://spark-master:7077
    ports:
      - "8081:8081"

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: adaptive-spark-worker-2
    depends_on:
      - spark-master
    environment:
      PYTHONPATH: /workspace/src
    volumes:
      - ./:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8082"
      - --memory
      - 2G
      - --cores
      - "2"
      - spark://spark-master:7077
    ports:
      - "8082:8082"

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: adaptive-streamlit
    depends_on:
      - spark-master
    command:
      - streamlit
      - run
      - dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "8501:8501"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adaptive-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.docker.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: adaptive-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/adaptive-sorting-dashboard.json:ro
    ports:
      - "3000:3000"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: adaptive-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
